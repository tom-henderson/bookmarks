{% extends "base.html" %}

{% block content %}
<div class="container">

  {% if form.errors %}
  <div class="row">
    <div class="col-md-6 offset-md-3 alert alert-warning alert-dismissible">
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      {% for error in form.non_field_errors %}
      <p><strong>Oops:</strong> {{ error }}</p>
      {% endfor %}
    </div>
  </div>
  {% endif %}


  <div class="row">
    <div class="col-md-6 offset-md-3">

      <form role="form" method="post" action="{% url 'log_in' %}">
        {% csrf_token %}

        <div class="mb-3 row">
          <label for="username" class="col-md-2 col-form-label">Username</label>
          <div class="col-md-10">
            <input type="text" class="form-control" id="username" name="username" placeholder="Username">
          </div>
        </div>

        <div class="mb-3 row">
          <label for="password" class="col-md-2 col-form-label">Password</label>
          <div class="col-md-10">
            <input type="password" class="form-control" id="password" name="password" placeholder="Password">
          </div>
        </div>

        <div class="mb-3 row">
          <div class="col-sm-4 offset-sm-8">
            <button type="submit" class="btn btn-primary btn-block w-100">Log in</button>
          </div>
        </div>

        <input type="hidden" name="next" value="{{ next }}" />
      </form>

    </div>
  </div>
</div>
{% endblock %}
