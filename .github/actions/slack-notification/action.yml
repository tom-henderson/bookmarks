name: Slack Notification
description: Send a message to a Slack channel via webhook

inputs:
  message:
    description: Message text to send
    required: true
  channel:
    description: Slack channel (e.g. '#docker')
    required: false
  webhook-url:
    description: Slack webhook URL
    required: false

runs:
  using: composite
  steps:
    - shell: bash
      env:
        MESSAGE: ${{ inputs.message }}
        SLACK_CHANNEL: ${{ inputs.channel }}
        SLACK_WEBHOOK_URL: ${{ inputs.webhook-url }}
      run: |
        if [[ -z "$SLACK_WEBHOOK_URL" ]]; then
          echo "INFO: No webhook URL, skipping notification."
          exit
        fi

        PAYLOAD="'text':'${MESSAGE}'"

        if [[ -n "$SLACK_CHANNEL" ]]; then
          PAYLOAD="${PAYLOAD},'channel':'${SLACK_CHANNEL}'"
        fi

        echo "INFO: Sending slack message ${MESSAGE}."
        curl --silent --output /dev/null --show-error --request POST --header 'Content-type: application/json' --data "{${PAYLOAD}}" "${SLACK_WEBHOOK_URL}"
