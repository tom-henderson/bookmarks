name: Container Build

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Docker Build and Push
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    env:
      SLACK_CHANNEL: '#docker'
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          IMAGE_NAME="${{ inputs.image-name }}"
          LATEST_TAG=$(git tag --list "${IMAGE_NAME}-*" --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            echo "version=1.0.0" >> "$GITHUB_OUTPUT"
          else
            CURRENT="${LATEST_TAG#${IMAGE_NAME}-}"
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)
            echo "version=${MAJOR}.${MINOR}.$((PATCH + 1))" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker Build and Push
        env:
          IMAGE_ID: "ghcr.io/${{ github.repository }}/${{ inputs.image-name }}"
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          docker build -t ${IMAGE_ID}:${VERSION} .
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ${IMAGE_ID}:${VERSION}

      - name: Create git tag
        uses: actions/github-script@v7
        env:
          TAG_NAME: "${{ inputs.image-name }}-${{ steps.version.outputs.version }}"
        with:
          script: |
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${process.env.TAG_NAME}`,
              sha: context.sha,
            });

      - name: Slack notification (success)
        uses: ./.github/actions/slack-notification
        with:
          message: ":label: `${{ github.repository }}` tagged `${{ inputs.image-name }}-${{ steps.version.outputs.version }}`"
          channel: ${{ env.SLACK_CHANNEL }}
          webhook-url: ${{ env.SLACK_WEBHOOK_URL }}

      - name: Slack notification (failure)
        if: failure()
        uses: ./.github/actions/slack-notification
        with:
          message: ":red_circle: Deploy failed for `${{ inputs.image-name }}-${{ steps.version.outputs.version }}`"
          channel: ${{ env.SLACK_CHANNEL }}
          webhook-url: ${{ env.SLACK_WEBHOOK_URL }}
